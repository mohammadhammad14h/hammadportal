<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowledgeMentor Labs - Premium Activation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #0f172a, #020617); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">
    <header class="border-b border-slate-800/80 bg-slate-950/70 backdrop-blur-md px-4 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-white tracking-tight">KnowledgeMentor Labs</h1>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl p-8 rounded-2xl border border-slate-800 shadow-2xl">
            <div class="text-center mb-6">
                <span class="bg-sky-500/10 text-sky-400 text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-full border border-sky-500/20">Step 1: Application Node</span>
                <h2 class="text-2xl font-bold text-white mt-3">Activate Premium Engine</h2>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Your Email Address</label>
                    <input type="email" id="payEmail" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-sky-500" placeholder="user@gmail.com">
                </div>
                <button onclick="proceedToVerify()" class="w-full bg-gradient-to-r from-sky-500 to-indigo-500 text-white font-bold py-3.5 rounded-xl transition-all text-sm">
                    Proceed to Verification
                </button>
            </div>
        </div>
    </main>
    <script>
        function proceedToVerify() {
            const email = document.getElementById('payEmail').value.trim();
            if(!email) { alert("Please enter your email!"); return; }
            window.location.href = `verifyemail.html?email=${encodeURIComponent(email)}`;
        }
    </script>
</body>
</html>
