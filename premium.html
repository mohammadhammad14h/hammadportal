<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowledgeMentor - Premium Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #0f172a, #020617); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">
    <header class="border-b border-slate-800/80 bg-slate-950/70 backdrop-blur-md px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold text-white">KnowledgeMentor Dashboard</h1>
                <p id="sessionUser" class="text-xs text-emerald-400 font-mono">Loading Session...</p>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-4xl bg-slate-900/40 backdrop-blur-xl p-8 rounded-2xl border border-slate-800 shadow-2xl space-y-6">
            <h2 class="text-xl font-bold text-white">Welcome to 3 Premium Prompt Engines</h2>
            <p class="text-sm text-slate-400">Aapka structural layout successfully authentication handshake clear kar chuka hai (30 Days License Active).</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Select High-Performance Framework Node</label>
                    <select id="agentPromptSelect" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-sky-500 text-sm font-medium">
                        <option value="AEGIS v2.0 Legal T&C Forensics Auditor Framework">🛡️ Framework 1: AEGIS v2.0 Legal T&C Forensics Auditor</option>
                        <option value="The Financial Controller & Ledger Architect Framework (GAAP/IFRS)">📒 Framework 2: The Financial Controller & Ledger Architect (GAAP/IFRS)</option>
                        <option value="Master Humanized Writer Engine Framework (Anti-Detection)">✍️ Framework 3: Master Humanized Writer Engine (Anti-Detection)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Downstream Compilation Language</label>
                    <select id="languageSelect" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-sky-500 text-sm font-medium">
                        <option value="Pure English Output Structure (Standard)">Pure English Output Structure (Standard)</option>
                        <option value="Urdu Unicode Text Script (اردو)">Urdu Unicode Text Script (اردو)</option>
                        <option value="Roman Urdu Structural (Conversational)">Roman Urdu Structural (Conversational)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Unstructured Target Payload Source (Raw Text)</label>
                <textarea id="rawPayloadInput" rows="6" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white placeholder-slate-600 focus:outline-none focus:border-sky-500 text-sm font-mono" placeholder="Paste data sheets here..."></textarea>
            </div>

            <button id="runBtn" onclick="executeLocalEnginePipeline()" class="w-full bg-gradient-to-r from-sky-400 via-blue-500 to-indigo-600 text-white font-bold py-4 rounded-xl shadow-xl hover:opacity-95 transition-all text-sm tracking-wide">
                Execute System-Locked Framework Pipeline
            </button>

            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 min-h-[100px] text-sm text-slate-400 font-mono whitespace-pre-wrap" id="engineTerminalOutput">Ready... Input data paste karein aur upar button par click karke pipeline execute karein.</div>
        </div>
    </main>

    <script>
        // NEW URL PLUGGED IN SUCCESSFULLY
        const DEPLOYED_WEBAPP_ENDPOINT = "https://script.google.com/macros/s/AKfycbxtnTfto35vZJNBmFf6GVvhvMxDLQoJu4bf8LW4L4xvn_J-vemHV6J8sUsO9GFOkW6h/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionEmail = urlParams.get('email');
        const sessionToken = urlParams.get('session');

        if (!currentSessionEmail || sessionToken !== 'active_secure') {
            alert("Security Lock: Invalid session token. Redirecting to verification.");
            window.location.href = 'verifyemail.html';
        } else {
            document.getElementById('sessionUser').innerText = "Operator: " + currentSessionEmail;
        }

        async function executeLocalEnginePipeline() {
            const rawText = document.getElementById('rawPayloadInput').value.trim();
            const terminal = document.getElementById('engineTerminalOutput');
            const selectedFramework = document.getElementById('agentPromptSelect').value;
            const selectedLang = document.getElementById('languageSelect').value;
            const btn = document.getElementById('runBtn');

            if(!rawText) { alert("Matrix Error: Input payload data required."); return; }
            
            terminal.style.color = "#fbbf24";
            terminal.innerText = `Compiling pipeline array for ${selectedFramework}...\nSending parameters to Gemini Pro Engine Layer... Please wait.`;
            btn.disabled = true;

            const combinedPromptText = `Selected Agent Framework: ${selectedFramework}\nTarget Output Language Style: ${selectedLang}\n\nUser Data Input:\n${rawText}`;

            try {
                const response = await fetch(DEPLOYED_WEBAPP_ENDPOINT, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'execute_prompt',
                        prompt: combinedPromptText
                    })
                });

                const result = await response.json();
                btn.disabled = false;
                
                if(result.status === "success") {
                    terminal.style.color = "#f8fafc"; 
                    terminal.innerText = result.output;
                } else {
                    terminal.style.color = "#ef4444";
                    terminal.innerText = "Error Node Interrupted: " + (result.message || "Server rejected payload compilation request.");
                }

            } catch(e) {
                terminal.style.color = "#ef4444";
                terminal.innerText = "Handshake Failed: Network failed to communicate with execution core pipeline.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
